{% extends "base.html" %}
{% block content %}
<section>
    <h2>Add Wine</h2>
    <div class="row">
        <div class="col-sm-6">
            <div class="card">
                <form action="{{ url_for('create_wine') }}" method="post">
                    <label for="shop_id">Shop</label>
                    <select id="shop_id" name="shop_id" required>
                        <option value="">Select shop</option>
                        {% for shop in shops %}
                            <option value="{{ shop.id }}">{{ shop.name }}</option>
                        {% endfor %}
                    </select>

                    <label for="name">Wine name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="short_name">Short name</label>
                    <input type="text" id="short_name" name="short_name" maxlength="20" placeholder="e.g., CHR">

                    <label for="ml">ML</label>
                    <input type="number" id="ml" name="ml" min="1" step="1" required>

                    <div class="form-actions">
                        <button type="submit">Save wine</button>
                        <button type="reset">Clear</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <h3>Shop Products</h3>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Shop</th>
                    <th>Wine</th>
                    <th>Short Name</th>
                    <th>ML</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
            {% for wine in wines %}
                <tr>
                    <td data-label="Shop">{{ wine.shop.name }}</td>
                    <td data-label="Wine">{{ wine.name }}</td>
                    <td data-label="Short Name">{{ wine.short_name or "-" }}</td>
                    <td data-label="ML">{{ wine.ml or "-" }}</td>
                    <td data-label="Delete">
                        <form action="{{ url_for('owner_delete_wine', wine_id=wine.id) }}" method="post" onsubmit="return confirm('Delete this wine and its price and stock history?');">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            {% else %}
                <tr><td colspan="5">No wines added yet.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
