{% extends "base.html" %}
{% block content %}
<section>
    <h2>All Shops</h2>
    <div class="row">
        {% for shop in shops %}
            <div class="col-sm-6">
                <div class="card">
                    <h4>{{ shop.name }}</h4>
                    <p>{{ shop.location }}</p>
                    <a href="{{ url_for('shop_detail', shop_id=shop.id) }}">Open shop</a>
                </div>
            </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
