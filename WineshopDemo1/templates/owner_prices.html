{% extends "base.html" %}
{% block content %}
<section>
    <h2>Manage Prices</h2>
    <div class="row">
        {% for shop in shops %}
            <div class="col-sm-6">
                <div class="card">
                    <h4>{{ shop.name }}</h4>
                    <p>{{ shop.location or "No address added" }}</p>
                    <a href="{{ url_for('owner_manage_prices', shop_id=shop.id) }}">Open prices</a>
                </div>
            </div>
        {% else %}
            <div class="col-sm-6">
                <div class="card">
                    <p>Add a shop before managing prices.</p>
                </div>
            </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
